<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信读书笔记导出</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #F5F7FA;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #E8ECF0;
      --bg-sidebar: #1A66B3;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-muted: #9A9A9A;
      --text-white: #FFFFFF;
      --accent: #1A66B3;
      --accent-hover: #1557A0;
      --accent-light: #4D8DC9;
      --accent-bg: #EEF4FB;
      --border: #E0E6EC;
      --shadow: rgba(26, 26, 26, 0.08);
      --success: #2EA569;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 520px;
      min-height: 600px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 160px;
      min-height: 600px;
      background: var(--bg-sidebar);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 16px;
    }

    .sidebar-logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-white);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-logo-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .sidebar-nav {
      flex: 1;
    }

    .sidebar-nav-item {
      padding: 12px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid transparent;
    }

    .sidebar-nav-item:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-white);
    }

    .sidebar-nav-item.active {
      background: rgba(255,255,255,0.15);
      color: var(--text-white);
      border-left-color: var(--text-white);
    }

    .sidebar-nav-item .icon {
      font-size: 16px;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    .sidebar-status {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .sidebar-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 6px;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    /* Header */
    .header {
      margin-bottom: 20px;
    }

    .header-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Status */
    .status-card {
      padding: 14px 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(46, 165, 105, 0.2);
    }

    .status-dot.error {
      background: #D94545;
    }

    .status-info {
      flex: 1;
    }

    .status-title {
      font-size: 14px;
      font-weight: 500;
    }

    .status-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Section */
    .section {
      margin-bottom: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .section-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .section-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Search */
    .search-bar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px;
      background: var(--bg-tertiary);
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-secondary);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    /* Filters */
    .filters {
      padding: 12px 16px;
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-label {
      color: var(--text-muted);
    }

    select {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
    }

    /* Book List */
    .book-list {
      max-height: 240px;
      overflow-y: auto;
      padding: 8px;
    }

    .book-list::-webkit-scrollbar {
      width: 6px;
    }

    .book-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .book-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .book-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
      gap: 10px;
    }

    .book-item:hover {
      background: var(--bg-tertiary);
    }

    .book-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .book-title {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-meta {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Pagination */
    .pagination {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .pagination-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .pagination-btn:hover:not(:disabled) {
      background: var(--bg-tertiary);
      border-color: var(--text-muted);
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Actions */
    .actions {
      padding: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      flex: 1;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--accent-light);
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #D8DDE3;
    }

    /* Export Options */
    .export-options {
      padding: 12px 16px;
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    .export-option {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .export-option input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
    }

    /* Result */
    .result {
      padding: 20px;
      background: var(--accent-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--accent-light);
      text-align: center;
    }

    .result-success {
      color: var(--success);
      font-size: 14px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .result-actions .btn {
      flex: 1;
      justify-content: center;
    }

    /* Progress */
    .progress-section {
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    .progress-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Empty */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* Loading */
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section, .status-card, .progress-section {
      animation: fadeIn 0.3s ease forwards;
    }

    .status-card { animation-delay: 0.05s; }
    .section { animation-delay: 0.1s; }
    .progress-section { animation-delay: 0.1s; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📖</div>
        微信读书
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-item active">
        <span class="icon">📚</span>
        我的书架
      </div>
      <div class="sidebar-nav-item">
        <span class="icon">📝</span>
        导出笔记
      </div>
      <div class="sidebar-nav-item">
        <span class="icon">⚙️</span>
        设置
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-status">
        <span class="sidebar-status-dot"></span>
        <span id="sidebarStatusText">已连接</span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Header -->
    <div class="header">
      <div class="header-title">笔记导出</div>
      <div class="header-subtitle">将阅读笔记导出为 Markdown 格式</div>
    </div>

    <!-- Status -->
    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-info">
        <div class="status-title" id="statusTitle">等待连接</div>
        <div class="status-desc" id="statusDesc">在 weread.qq.com 打开插件</div>
      </div>
    </div>

    <!-- Book List Section -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">我的书架</span>
        <span class="section-count" id="bookCount">0 本</span>
      </div>

      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索书名或作者..." />
      </div>

      <div class="filters">
        <div class="filter-group">
          <span class="filter-label">排序</span>
          <select id="sortSelect">
            <option value="title">书名</option>
            <option value="author">作者</option>
            <option value="noteCount">想法数</option>
          </select>
        </div>
        <div class="filter-group">
          <select id="sortOrder">
            <option value="asc">升序</option>
            <option value="desc">降序</option>
          </select>
        </div>
      </div>

      <div class="book-list" id="bookList">
        <div class="empty">
          <div class="empty-icon">📚</div>
          <div>加载中...</div>
        </div>
      </div>

      <div class="pagination">
        <button class="pagination-btn" id="prevPageBtn" disabled>上一页</button>
        <span id="pageInfo">1-50 / 0</span>
        <button class="pagination-btn" id="nextPageBtn" disabled>下一页</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="actions">
        <button class="btn btn-secondary" id="refreshBtn">🔄 刷新</button>
        <button class="btn btn-secondary" id="toggleSelectBtn">☑️ 反选</button>
        <button class="btn btn-secondary" id="selectAllBtn">✅ 全选</button>
      </div>
      <div class="export-options">
        <label class="export-option">
          <input type="checkbox" id="exportNotes" checked />
          想法/笔记
        </label>
        <label class="export-option">
          <input type="checkbox" id="exportBookmarks" checked />
          划线
        </label>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="exportSelectedBtn">📥 导出所选</button>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">准备中...</div>
    </div>

    <!-- Result -->
    <div id="resultSection" style="display: none;">
      <div class="result">
        <div class="result-success" id="resultText">导出成功！</div>
        <div class="result-actions">
          <button class="btn btn-primary" id="downloadBtn">📥 下载</button>
          <button class="btn btn-secondary" id="copyBtn">📋 复制</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
